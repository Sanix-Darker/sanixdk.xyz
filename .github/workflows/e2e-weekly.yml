name: E2E weekly long-rotation baseline

# Promotes the most recent successful e2e-nightly artifact into a weekly
# checkpoint. The repository's GitHub Actions retention limit is 90 days,
# so this reduces daily artifact noise without pretending it is a yearly
# archive.
#
# Mechanism in two sentences:
#   1. Find the most recent successful nightly run via the GitHub REST API
#      (no GH-Actions in-workflow artifact access — different workflow).
#   2. Download its single TEST_LOG.md artifact, then re-upload it as a
#      weekly checkpoint with the repository's maximum retention.
#
# Why a separate workflow (vs. embedding in e2e-nightly.yml):
#   - Cross-workflow artifact access requires `gh run` CLI + actions:read,
#     which stays scoped to this weekly job rather than every runner.
#   - A separate weekly artifact is easier to select as a baseline than
#     one entry among roughly 90 nightly artifacts.

on:
  schedule:
    # Sunday 04:07 UTC, four hours after the Sunday nightly. Seven minutes
    # past the hour offsets the on-the-hour quota race.
    - cron: '7 4 * * 0'
  workflow_dispatch:

# Stop stacking weekly rotations if the Sunday job gets stuck — there's
# no value in N concurrent weekly runs once the latest has all the info.
concurrency:
  group: e2e-weekly-rotation
  cancel-in-progress: true

# Least privilege: gh needs actions:read to find and download a prior run.
# upload-artifact uses the runner artifact service and needs no write-scoped
# GITHUB_TOKEN permission.
permissions:
  actions: read
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    # Generous enough for REST call + download + re-upload; tighter than
    # the nightly because the heavy lifting was already done upstream.
    timeout-minutes: 10

    steps:
      - name: Ensure gh CLI available
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Find latest successful e2e-nightly run
        id: locate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          record="$(gh run list \
            --workflow='e2e-nightly.yml' \
            --branch='master' \
            --event='schedule' \
            --status=success \
            --limit=1 \
            --json databaseId,headSha \
            --jq '.[0] | [.databaseId, .headSha] | @tsv' 2>/dev/null || true)"
          IFS=$'\t' read -r latest source_sha <<< "${record}"
          if [[ -z "${latest}" ]]; then
            echo "::warning::No successful e2e-nightly run found in history."
            echo "::warning::Weekly promotion is a no-op this cycle (operator to investigate nightly)."
            echo "latest_nightly_run=" >> "$GITHUB_OUTPUT"
            echo "source_sha=" >> "$GITHUB_OUTPUT"
          else
            echo "latest_nightly_run=${latest} source_sha=${source_sha}"
            echo "latest_nightly_run=${latest}" >> "$GITHUB_OUTPUT"
            echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the latest nightly's TEST_LOG.md
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          run_id="${{ steps.locate.outputs.latest_nightly_run }}"
          source_sha="${{ steps.locate.outputs.source_sha }}"
          if [[ -z "${run_id}" ]]; then
            echo "::warning::Skipping download: no nightly run id."
            exit 0
          fi
          rm -rf extracted && mkdir -p extracted
          gh run download "${run_id}" \
            --name "e2e-nightly-test-log-sha-${source_sha}" \
            --dir extracted
          # upload-artifact zips with the directory layout
          # (`path: docs/TEST_LOG.md` → `docs/TEST_LOG.md` inside the
          # archive). gh run download flattens the archive under the
          # given --dir. Cope with both layouts just in case a future
          # upload-artifact version drops the directory component.
          if [[ -f extracted/docs/TEST_LOG.md ]]; then
            mkdir -p docs && cp extracted/docs/TEST_LOG.md docs/TEST_LOG.md
          elif [[ -f extracted/TEST_LOG.md ]]; then
            mkdir -p docs && cp extracted/TEST_LOG.md docs/TEST_LOG.md
          else
            echo "::warning::TEST_LOG.md missing from nightly artifact run ${run_id}."
            echo "::warning::Layout under extracted/:"
            ( find extracted -maxdepth 3 -type f || true ) | sed 's/^/  /'
            exit 0
          fi
          # No explicit "$GITHUB_OUTPUT" write needed: the upload step
          # gates on hashFiles('docs/TEST_LOG.md') != '' which is true here.

      - name: Upload promoted log (90-day retention)
        # `hashFiles()` returns '' when the file is missing → step skips.
        # This is the cleanest way to gate the upload without an explicit
        # env-marker step.
        if: hashFiles('docs/TEST_LOG.md') != ''
        uses: actions/upload-artifact@v7
        with:
          # Label the artifact with the source nightly, not this promoter run.
          name: e2e-weekly-test-log-sha-${{ steps.locate.outputs.source_sha }}-source-run-${{ steps.locate.outputs.latest_nightly_run }}
          path: docs/TEST_LOG.md
          # Confirmed through the repository Actions settings API.
          retention-days: 90
