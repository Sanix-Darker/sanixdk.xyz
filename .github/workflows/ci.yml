name: Website build

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make jq bc curl

      - name: Compile the builder
        run: make compile

      - name: Build the website
        run: make build

      - name: Run E2E harness
        id: e2e
        run: make e2e

      - name: Upload TEST_LOG.md artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-log
          path: docs/TEST_LOG.md
          if-no-files-found: warn
          retention-days: 14
